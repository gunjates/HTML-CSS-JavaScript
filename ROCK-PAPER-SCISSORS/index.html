<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RPS Game</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">
    <h1>Rock Paper Scissors</h1>

    <div class="score">
        Player: <span id="player-score">0</span> |
        Computer: <span id="computer-score">0</span> |
        Ties: <span id="ties-score">0</span>
    </div>

    <h2 id="countdown"></h2>
    <h2 id="result">Choose your move</h2>

    <div class="arena">

        <div class="side">
            <img id="player-hand" class="hand left" src="../ROCK-PAPER-SCISSORS/src/img/player-rock.png">
        </div>

        <div class="vs">VS</div>

        <div class="side">
            <img id="computer-hand" class="hand right" src="../ROCK-PAPER-SCISSORS/src/img/computer-rock.png">
        </div>

    </div>

    <div class="buttons">
        <button data-choice="rock">Rock</button>
        <button data-choice="paper">Paper</button>
        <button data-choice="scissors">Scissors</button>
    </div>

    <button id="reset-btn">Reset Game</button>
</div>

<script src="app.js"></script>
</body>
</html>
